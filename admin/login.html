<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Charles Shalua</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">Charles<span>.</span></div>
      <p class="login-subtitle">Admin Panel</p>

      <h1 class="login-title">Sign in</h1>
      <p class="login-subtitle" style="margin-bottom: 28px;">Enter your credentials to continue</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <a href="../index.html" class="login-back">← Back to main site</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://oqgybwucpuiqniytmiby.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hb2sbUi_9dAaXJPX13lppg_2J8j9P6A';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, redirect immediately
    db.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.href = 'dashboard.html';
      }
    });

    const form      = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const errorBox  = document.getElementById('loginError');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || 'Invalid credentials. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
        return;
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
